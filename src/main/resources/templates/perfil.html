<!DOCTYPE html>
<html>
<head>
    <title>Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="text-center mb-4">Mis Datos</h3>

        <table class="table table-bordered">
            <tr><th>Tipo ID</th><td th:text="${cliente.tipoID}"></td></tr>
            <tr><th>Nro ID</th><td th:text="${cliente.nroID}"></td></tr>
            <tr><th>Nombre</th><td th:text="${cliente.nombre}"></td></tr>
            <tr><th>Apellido</th><td th:text="${cliente.apellido}"></td></tr>
            <tr><th>Usuario</th><td th:text="${cliente.usuario}"></td></tr>
            <tr><th>Celular</th><td th:text="${cliente.noCelular}"></td></tr>
            <tr><th>Correo</th><td th:text="${cliente.correo}"></td></tr>
        </table>

        <a href="/" class="btn btn-secondary">Cerrar sesión</a>

    </div>
</div>

</body>
</html>
