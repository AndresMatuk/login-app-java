<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="text-center">Registro de Cliente</h3>

        <form action="/registrar" method="post">

			<select class="form-control mb-2" name="tipoID">
			    <option value="CC">Cédula</option>
			    <option value="TI">Tarjeta de Identidad</option>
			    <option value="PASAPORTE">Pasaporte</option>
			    <option value="CE">Cédula de Extranjería</option>
			</select>
            <input class="form-control mb-2" name="nroID" placeholder="Número ID">
            <input class="form-control mb-2" name="nombre" placeholder="Nombre">
            <input class="form-control mb-2" name="apellido" placeholder="Apellido">
            <input class="form-control mb-2" name="usuario" placeholder="Usuario">
            <input class="form-control mb-2" name="contrasena" placeholder="Contraseña">
            <input class="form-control mb-2" name="noCelular" placeholder="Celular">
            <input class="form-control mb-2" name="correo" placeholder="Correo">

            <button class="btn btn-primary w-100">Registrar</button>
        </form>

        <a href="/" class="mt-3">Volver al login</a>

    </div>
</div>

</body>
</html>
